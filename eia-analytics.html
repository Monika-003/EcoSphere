<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIA Analytics — EcoSphere</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Design tokens ───────────────────────────────────────────────── */
:root {
  --p:    #0d9488; --pv: #0f766e; --ps: #ccfbf1;
  --acc:  #059669; --warn: #d97706; --danger: #ef4444;
  --bg:   #f0fdfa; --card: #ffffff;
  --txt:  #0f172a; --txt2: #475569; --txt3: #94a3b8;
  --bdr:  #e2e8f0; --bdr2: #cbd5e1;
  --r:    12px; --shadow: 0 2px 12px rgba(0,0,0,.07);
  --fnt:  'Segoe UI', system-ui, -apple-system, sans-serif;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { font-family: var(--fnt); background: var(--bg); color: var(--txt); min-height: 100vh; }

/* ── Layout ──────────────────────────────────────────────────────── */
.page { max-width: 1280px; margin: 0 auto; padding: 0 20px 48px; }

.an-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(240,253,250,.95); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--bdr);
  padding: 14px 20px; margin: 0 -20px 28px;
  display: flex; align-items: center; gap: 14px;
}
.an-header .logo { width: 36px; height: 36px; border-radius: 8px; background: var(--p); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1rem; flex-shrink: 0; }
.an-header h1 { font-size: 1.1rem; font-weight: 800; color: var(--p); }
.an-header .proj-name { font-size: .82rem; color: var(--txt2); margin-top: 1px; }
.an-header .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.badge-teal    { background: var(--ps); color: var(--pv); }
.badge-green   { background: #dcfce7; color: #166534; }
.badge-amber   { background: #fef9c3; color: #92400e; }
.badge-red     { background: #fee2e2; color: #991b1b; }
.badge-gray    { background: #f1f5f9; color: #475569; }
.badge-purple  { background: #ede9fe; color: #4c1d95; }
.badge-orange  { background: #ffedd5; color: #9a3412; }

.btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 8px; font-size: .8rem; font-weight: 700; border: none; cursor: pointer; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-outline { background: #fff; border: 1.5px solid var(--bdr2); color: var(--txt2); }
.btn-primary { background: var(--p); color: #fff; }

/* ── Cards ───────────────────────────────────────────────────────── */
.card { background: var(--card); border: 1px solid var(--bdr); border-radius: var(--r); box-shadow: var(--shadow); padding: 20px 22px; }
.card-title { font-size: .78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--txt3); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card-title i { color: var(--p); }

/* ── Grid layouts ────────────────────────────────────────────────── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
.g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.full { grid-column: 1 / -1; }
.section-gap { margin-bottom: 18px; }

@media (max-width: 900px) { .g2,.g3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 640px) { .g2,.g3,.g4 { grid-template-columns: 1fr; } }

/* ── Loading / error overlay ─────────────────────────────────────── */
#overlay { position: fixed; inset: 0; background: rgba(240,253,250,.92); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
#overlay .spin { width: 48px; height: 48px; border: 4px solid var(--ps); border-top-color: var(--p); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#overlay .ov-msg { font-size: .9rem; color: var(--txt2); font-weight: 600; }
#overlay.hidden { display: none; }

/* ── Performance Score ───────────────────────────────────────────── */
.score-wrap { display: flex; flex-direction: column; align-items: center; padding: 8px 0 4px; }
.gauge-svg { width: 180px; height: 180px; }
.score-subs { width: 100%; margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.sub-row { display: flex; align-items: center; gap: 10px; }
.sub-label { font-size: .7rem; color: var(--txt2); font-weight: 600; width: 82px; flex-shrink: 0; }
.sub-bar-wrap { flex: 1; background: #f1f5f9; border-radius: 4px; height: 7px; overflow: hidden; }
.sub-bar-fill { height: 100%; border-radius: 4px; transition: width .8s ease; }
.sub-val { font-size: .7rem; font-weight: 800; color: var(--txt); width: 34px; text-align: right; flex-shrink: 0; }

/* ── Compliance ──────────────────────────────────────────────────── */
.comp-medium { border: 1px solid var(--bdr); border-radius: 10px; padding: 14px; }
.comp-medium-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.comp-medium-name { font-size: .8rem; font-weight: 800; display: flex; align-items: center; gap: 6px; }
.comp-score-ring { width: 52px; height: 52px; position: relative; flex-shrink: 0; }
.comp-score-ring svg { width: 52px; height: 52px; }
.comp-score-ring text { font-family: var(--fnt); }
.comp-bar-item { display: flex; align-items: center; gap: 6px; font-size: .68rem; color: var(--txt2); margin-bottom: 4px; }
.comp-bar-item .cbr { flex: 1; background: #f1f5f9; border-radius: 3px; height: 5px; overflow: hidden; }
.comp-bar-item .cbf { height: 100%; border-radius: 3px; }
.comp-stats { display: flex; gap: 12px; margin-top: 10px; }
.comp-stat { flex: 1; background: #f8fafc; border-radius: 8px; padding: 7px 10px; text-align: center; }
.comp-stat .cs-val { font-size: 1.1rem; font-weight: 800; }
.comp-stat .cs-lbl { font-size: .62rem; color: var(--txt3); font-weight: 600; text-transform: uppercase; }

/* ── Risk Matrix ─────────────────────────────────────────────────── */
.risk-summary { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.risk-chip { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px; font-size: .72rem; font-weight: 800; border: 1px solid transparent; }
.risk-chip.VERY_HIGH { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
.risk-chip.HIGH      { background: #ffedd5; color: #9a3412; border-color: #fed7aa; }
.risk-chip.MODERATE  { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
.risk-chip.LOW       { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
.risk-chip.NEGLIGIBLE{ background: #f1f5f9; color: #475569; border-color: var(--bdr); }

.matrix-table { width: 100%; border-collapse: collapse; font-size: .75rem; margin-bottom: 18px; }
.matrix-table th { padding: 7px 10px; background: #f8fafc; font-weight: 700; color: var(--txt2); border: 1px solid var(--bdr); text-align: center; }
.matrix-table td { padding: 8px 10px; border: 1px solid var(--bdr); text-align: center; font-weight: 700; font-size: .8rem; }
.mt-vh { background: #fee2e2; color: #991b1b; }
.mt-hi { background: #ffedd5; color: #9a3412; }
.mt-mo { background: #fef9c3; color: #854d0e; }
.mt-lo { background: #dcfce7; color: #166534; }
.mt-ne { background: #f8fafc; color: #64748b; }

.risk-list-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--bdr); }
.risk-list-item:last-child { border-bottom: none; }
.rl-sig { flex-shrink: 0; padding: 3px 8px; border-radius: 6px; font-size: .65rem; font-weight: 800; text-transform: uppercase; }
.rl-body { flex: 1; }
.rl-comp { font-size: .78rem; font-weight: 700; }
.rl-desc { font-size: .72rem; color: var(--txt2); margin-top: 2px; }
.rl-mit-warn { font-size: .68rem; color: #ef4444; font-weight: 700; margin-top: 3px; }
.rl-mit-ok   { font-size: .68rem; color: #059669; font-weight: 700; margin-top: 3px; }

/* ── Monitoring Trends ───────────────────────────────────────────── */
.trend-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.trend-tab { padding: 6px 14px; border-radius: 999px; font-size: .76rem; font-weight: 700; border: 1.5px solid var(--bdr2); background: #fff; color: var(--txt2); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.trend-tab.active { background: var(--p); border-color: var(--p); color: #fff; }
.trend-tab .trend-badge { font-size: .62rem; padding: 1px 6px; border-radius: 999px; background: rgba(255,255,255,.25); color: inherit; }
.trend-panel { display: none; }
.trend-panel.active { display: block; }
.trend-meta { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
.trend-indicator { font-size: .75rem; font-weight: 700; display: flex; align-items: center; gap: 5px; }
.trend-indicator.IMPROVING { color: #059669; }
.trend-indicator.DEGRADING  { color: #ef4444; }
.trend-indicator.STABLE     { color: #d97706; }
.trend-indicator.UNKNOWN    { color: #94a3b8; }
.param-filter { display: flex; gap: 6px; flex-wrap: wrap; }
.param-btn { font-size: .68rem; padding: 3px 9px; border-radius: 6px; border: 1.5px solid var(--bdr2); background: #fff; color: var(--txt2); cursor: pointer; transition: all .15s; font-weight: 600; }
.param-btn.active { border-color: var(--p); background: var(--ps); color: var(--pv); }
.chart-wrap { position: relative; height: 260px; }

/* ── Mitigation ──────────────────────────────────────────────────── */
.mit-donut-wrap { display: flex; flex-direction: column; align-items: center; }
.mit-donut-canvas { max-width: 200px; max-height: 200px; }
.mit-legend { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; width: 100%; }
.mit-leg-item { display: flex; align-items: center; justify-content: space-between; font-size: .74rem; }
.mit-leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-right: 7px; }
.mit-leg-left { display: flex; align-items: center; }
.mit-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
.mit-stat { background: #f8fafc; border-radius: 8px; padding: 10px 12px; text-align: center; }
.mit-stat .ms-val { font-size: 1.4rem; font-weight: 800; color: var(--p); }
.mit-stat .ms-lbl { font-size: .65rem; color: var(--txt3); font-weight: 700; text-transform: uppercase; }
.comp-table { width: 100%; border-collapse: collapse; font-size: .74rem; margin-top: 14px; }
.comp-table th { padding: 7px 8px; background: #f8fafc; font-weight: 700; color: var(--txt2); border-bottom: 1px solid var(--bdr); text-align: left; }
.comp-table td { padding: 7px 8px; border-bottom: 1px solid var(--bdr); }
.comp-table tr:last-child td { border-bottom: none; }
.rate-bar-wrap { display: flex; align-items: center; gap: 6px; }
.rate-bar { flex: 1; background: #f1f5f9; height: 6px; border-radius: 3px; overflow: hidden; }
.rate-bar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
.gap-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--bdr); }
.gap-item:last-child { border-bottom: none; }
.gap-sig { flex-shrink: 0; }
.gap-body { flex: 1; }
.gap-comp { font-size: .76rem; font-weight: 700; }
.gap-desc { font-size: .7rem; color: var(--txt2); margin-top: 2px; }

/* ── AI Recommendations ──────────────────────────────────────────── */
.rec-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.rec-filter { padding: 5px 12px; border-radius: 999px; font-size: .72rem; font-weight: 700; border: 1.5px solid var(--bdr2); background: #fff; color: var(--txt2); cursor: pointer; transition: all .15s; }
.rec-filter.active { background: var(--p); border-color: var(--p); color: #fff; }
.rec-card { border: 1px solid var(--bdr); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; border-left: 4px solid transparent; }
.rec-card.CRITICAL { border-left-color: var(--danger); }
.rec-card.HIGH     { border-left-color: var(--warn); }
.rec-card.MEDIUM   { border-left-color: #3b82f6; }
.rec-card.LOW      { border-left-color: #059669; }
.rec-card-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.rec-title { font-size: .8rem; font-weight: 800; flex: 1; }
.rec-body { font-size: .75rem; color: var(--txt2); line-height: 1.5; margin-bottom: 8px; }
.rec-action { font-size: .74rem; color: var(--pv); font-weight: 600; display: flex; align-items: flex-start; gap: 6px; }
.rec-action i { flex-shrink: 0; margin-top: 1px; }

/* ── Misc ────────────────────────────────────────────────────────── */
.no-data { text-align: center; padding: 32px 0; color: var(--txt3); font-size: .85rem; }
.no-data i { font-size: 2rem; display: block; margin-bottom: 8px; }
.last-updated { font-size: .7rem; color: var(--txt3); margin-left: auto; }
.toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: .8rem; font-weight: 600; z-index: 9999; opacity: 0; transform: translateY(12px); transition: all .3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="overlay">
  <div class="spin"></div>
  <div class="ov-msg">Computing environmental analytics…</div>
</div>

<div class="toast" id="toast"></div>

<div class="page">

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <div class="an-header" id="an-header">
    <div class="logo"><i class="fas fa-leaf"></i></div>
    <div>
      <h1>EIA Analytics</h1>
      <div class="proj-name" id="hdr-proj">Loading…</div>
    </div>
    <div class="hdr-right">
      <span class="last-updated" id="last-updated"></span>
      <button class="btn btn-outline" onclick="refreshData()">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
      <button class="btn btn-outline" onclick="exitAnalytics()">
        <i class="fas fa-arrow-left"></i> Portal
      </button>
    </div>
  </div>

  <!-- ── Row 1: Performance Score + Compliance Overview ──────────── -->
  <div class="g2 section-gap" style="grid-template-columns:340px 1fr">

    <!-- Performance Score -->
    <div class="card" id="card-score">
      <div class="card-title"><i class="fas fa-tachometer-alt"></i> Environmental Performance Score</div>
      <div class="score-wrap">
        <div id="gauge-container"></div>
        <div class="score-subs" id="score-subs"></div>
      </div>
    </div>

    <!-- Compliance Overview -->
    <div class="card" id="card-compliance">
      <div class="card-title"><i class="fas fa-shield-check"></i> Compliance Dashboard</div>
      <div class="g2" id="compliance-grid" style="gap:12px"></div>
    </div>

  </div>

  <!-- ── Row 2: Risk Matrix ───────────────────────────────────────── -->
  <div class="card section-gap" id="card-risk">
    <div class="card-title"><i class="fas fa-exclamation-triangle"></i> Environmental Risk Matrix &amp; Impact Analysis</div>
    <div class="risk-summary" id="risk-summary"></div>
    <div class="g2" style="gap:20px">
      <div>
        <table class="matrix-table" id="matrix-table"></table>
      </div>
      <div>
        <div style="font-size:.74rem;font-weight:800;color:var(--txt2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">
          Top Risk Factors
        </div>
        <div id="top-risks-list"></div>
      </div>
    </div>
  </div>

  <!-- ── Row 3: Monitoring Trends ────────────────────────────────── -->
  <div class="card section-gap" id="card-trends">
    <div class="card-title"><i class="fas fa-chart-line"></i> Monitoring Trend Analysis</div>
    <div class="trend-tabs" id="trend-tabs"></div>
    <div id="trend-panels"></div>
  </div>

  <!-- ── Row 4: Mitigation + Recommendations ─────────────────────── -->
  <div class="g2 section-gap">

    <!-- Mitigation Effectiveness -->
    <div class="card" id="card-mitigation">
      <div class="card-title"><i class="fas fa-shield-alt"></i> Mitigation Effectiveness</div>
      <div id="mitigation-content"></div>
    </div>

    <!-- AI Recommendations -->
    <div class="card" id="card-recs">
      <div class="card-title"><i class="fas fa-robot"></i> AI Recommendations</div>
      <div class="rec-filters" id="rec-filters"></div>
      <div id="rec-list"></div>
    </div>

  </div>

</div><!-- /page -->

<script>
'use strict';

/* ── Config ─────────────────────────────────────────────────────── */
const API_EIA = '/api/v1/eia';
const params  = new URLSearchParams(location.search);
const ORG_ID  = params.get('orgId') || localStorage.getItem('eco_org_id') || '';
const PROJ_ID = params.get('projectId') || '';

let _analytics  = null;
let _trendCharts = {};
let _mitChart    = null;
let _activeRec   = 'ALL';

/* ── Helpers ─────────────────────────────────────────────────────── */
function getToken() {
  return localStorage.getItem('eco_access_token') || sessionStorage.getItem('eco_access_token') || '';
}

async function apiFetch(path) {
  const res = await fetch(path, {
    headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || 'API error ' + res.status);
  }
  return res.json();
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent  = msg;
  el.style.background = type === 'error' ? '#dc2626' : type === 'warn' ? '#d97706' : '#1e293b';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

function gaugeColor(score) {
  if (score >= 90) return '#059669';
  if (score >= 75) return '#0d9488';
  if (score >= 60) return '#d97706';
  if (score >= 40) return '#f97316';
  return '#ef4444';
}

function sigClass(sig) {
  return { VERY_HIGH: 'mt-vh', HIGH: 'mt-hi', MODERATE: 'mt-mo', LOW: 'mt-lo', NEGLIGIBLE: 'mt-ne' }[sig] || 'mt-ne';
}

function statusBadge(status) {
  if (status === 'COMPLIANT')     return '<span class="badge badge-green"><i class="fas fa-check-circle"></i>Compliant</span>';
  if (status === 'AT_RISK')       return '<span class="badge badge-amber"><i class="fas fa-exclamation-circle"></i>At Risk</span>';
  if (status === 'NON_COMPLIANT') return '<span class="badge badge-red"><i class="fas fa-times-circle"></i>Non-Compliant</span>';
  return '<span class="badge badge-gray">No Data</span>';
}

function trendIcon(t) {
  if (t === 'IMPROVING') return '<i class="fas fa-arrow-trend-down"></i> Improving';
  if (t === 'DEGRADING') return '<i class="fas fa-arrow-trend-up"></i> Degrading';
  if (t === 'STABLE')    return '<i class="fas fa-minus"></i> Stable';
  return '<i class="fas fa-question"></i> Unknown';
}

function rateColor(rate) {
  if (rate >= 90) return '#059669';
  if (rate >= 75) return '#0d9488';
  if (rate >= 60) return '#d97706';
  return '#ef4444';
}

/* ── Gauge SVG ──────────────────────────────────────────────────── */
function renderGauge(score, grade, gradeLabel) {
  const r            = 70;
  const circumference = 2 * Math.PI * r;
  const filled        = (Math.min(100, Math.max(0, score)) / 100) * circumference;
  const color         = gaugeColor(score);
  document.getElementById('gauge-container').innerHTML = `
    <svg viewBox="0 0 180 180" class="gauge-svg" role="img" aria-label="Score ${score}/100">
      <circle cx="90" cy="90" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="14"/>
      <circle cx="90" cy="90" r="${r}" fill="none" stroke="${color}" stroke-width="14"
        stroke-dasharray="${filled.toFixed(2)} ${circumference.toFixed(2)}"
        stroke-linecap="round" transform="rotate(-90 90 90)"
        style="transition:stroke-dasharray 1.1s cubic-bezier(.4,0,.2,1)"/>
      <text x="90" y="85" text-anchor="middle" dominant-baseline="middle"
        font-size="30" font-weight="800" fill="${color}">${score}</text>
      <text x="90" y="104" text-anchor="middle"
        font-size="11" fill="#94a3b8">out of 100</text>
      <text x="90" y="122" text-anchor="middle"
        font-size="19" font-weight="800" fill="${color}">Grade ${grade}</text>
      <text x="90" y="139" text-anchor="middle"
        font-size="11" fill="#64748b">${gradeLabel}</text>
    </svg>`;
}

function renderScoreSubs(components, weights) {
  const items = [
    { key: 'compliance',  label: 'Compliance',  icon: 'fa-shield-check' },
    { key: 'mitigation',  label: 'Mitigation',  icon: 'fa-shield-alt'   },
    { key: 'monitoring',  label: 'Monitoring',  icon: 'fa-chart-bar'    },
    { key: 'trend',       label: 'Trend',        icon: 'fa-chart-line'   },
  ];
  document.getElementById('score-subs').innerHTML = items.map(item => {
    const val = Math.round(components[item.key]);
    const color = gaugeColor(val);
    const wt    = Math.round((weights[item.key] || 0) * 100);
    return `<div class="sub-row">
      <div class="sub-label"><i class="fas ${item.icon}" style="color:${color};margin-right:4px;font-size:.65rem"></i>${item.label}<span style="color:var(--txt3);font-weight:500"> ·${wt}%</span></div>
      <div class="sub-bar-wrap"><div class="sub-bar-fill" style="width:${val}%;background:${color}"></div></div>
      <div class="sub-val" style="color:${color}">${val}</div>
    </div>`;
  }).join('');
}

/* ── Compliance ─────────────────────────────────────────────────── */
const MEDIUM_META = {
  air:   { label: 'Air Quality',   icon: 'fa-wind',      color: '#0d9488' },
  water: { label: 'Water Quality', icon: 'fa-water',     color: '#3b82f6' },
  soil:  { label: 'Soil Quality',  icon: 'fa-mountain',  color: '#d97706' },
  noise: { label: 'Noise Levels',  icon: 'fa-volume-up', color: '#7c3aed' }
};

function ringForScore(score, color, size) {
  if (score === null) {
    return `<svg viewBox="0 0 52 52" width="${size}" height="${size}">
      <circle cx="26" cy="26" r="22" fill="none" stroke="#e2e8f0" stroke-width="6"/>
      <text x="26" y="30" text-anchor="middle" font-size="9" fill="#94a3b8">N/A</text></svg>`;
  }
  const circ = 2 * Math.PI * 22;
  const arc  = (Math.min(100, Math.max(0, score)) / 100) * circ;
  return `<svg viewBox="0 0 52 52" width="${size}" height="${size}">
    <circle cx="26" cy="26" r="22" fill="none" stroke="#e2e8f0" stroke-width="5"/>
    <circle cx="26" cy="26" r="22" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${arc.toFixed(1)} ${circ.toFixed(1)}"
      stroke-linecap="round" transform="rotate(-90 26 26)"/>
    <text x="26" y="30" text-anchor="middle" font-size="10" font-weight="800" fill="${color}">${score}%</text>
  </svg>`;
}

function renderCompliance(compliance) {
  const grid = document.getElementById('compliance-grid');
  grid.innerHTML = Object.entries(compliance).map(([med, c]) => {
    const meta  = MEDIUM_META[med];
    const color = c.status === 'COMPLIANT' ? '#059669' : c.status === 'AT_RISK' ? '#d97706' : c.status === 'NO_DATA' ? '#94a3b8' : '#ef4444';
    const topVio = c.topViolations.slice(0, 2).map(v =>
      `<div class="comp-bar-item">
        <span style="width:48px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap">${v.param}</span>
        <div class="cbr"><div class="cbf" style="width:${v.rate}%;background:${color}"></div></div>
        <span style="width:28px;text-align:right;flex-shrink:0">${v.rate}%</span>
      </div>`
    ).join('');
    return `<div class="comp-medium">
      <div class="comp-medium-hdr">
        <div class="comp-medium-name" style="color:${meta.color}">
          <i class="fas ${meta.icon}"></i>${meta.label}
        </div>
        <div class="comp-score-ring">${ringForScore(c.score, color, 52)}</div>
      </div>
      <div style="margin-bottom:8px">${statusBadge(c.status)}</div>
      ${topVio || '<div style="font-size:.7rem;color:var(--txt3)">No violations recorded</div>'}
      <div class="comp-stats">
        <div class="comp-stat">
          <div class="cs-val" style="color:${color}">${c.violations}</div>
          <div class="cs-lbl">Violations</div>
        </div>
        <div class="comp-stat">
          <div class="cs-val">${c.total}</div>
          <div class="cs-lbl">Records</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Risk Matrix ────────────────────────────────────────────────── */
function renderRiskMatrix(riskMatrix) {
  const { summary, matrix, topRisks, totalImpacts } = riskMatrix;

  /* Summary chips */
  const chipMeta = [
    { key: 'VERY_HIGH', label: 'Very High' }, { key: 'HIGH', label: 'High' },
    { key: 'MODERATE', label: 'Moderate' },   { key: 'LOW', label: 'Low' },
    { key: 'NEGLIGIBLE', label: 'Negligible' }
  ];
  document.getElementById('risk-summary').innerHTML =
    `<span style="font-size:.78rem;color:var(--txt2);font-weight:600;align-self:center">${totalImpacts} impact(s) assessed:</span>` +
    chipMeta.map(c => `<span class="risk-chip ${c.key}"><b>${summary[c.key] || 0}</b> ${c.label}</span>`).join('');

  /* Significance × ImpactType matrix */
  const levels = ['VERY_HIGH','HIGH','MODERATE','LOW','NEGLIGIBLE'];
  const levelLabels = { VERY_HIGH: 'Very High', HIGH: 'High', MODERATE: 'Moderate', LOW: 'Low', NEGLIGIBLE: 'Negligible' };
  const mt = document.getElementById('matrix-table');
  mt.innerHTML = `
    <thead>
      <tr>
        <th>Significance</th>
        <th><i class="fas fa-minus-circle" style="color:#ef4444"></i> Negative</th>
        <th><i class="fas fa-plus-circle" style="color:#059669"></i> Positive</th>
        <th><i class="fas fa-circle" style="color:#94a3b8"></i> Neutral</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      ${levels.map(sig => {
        const row   = (matrix[sig] || { NEGATIVE: 0, POSITIVE: 0, NEUTRAL: 0 });
        const total = row.NEGATIVE + row.POSITIVE + row.NEUTRAL;
        const cls   = sigClass(sig);
        return `<tr>
          <td class="${cls}" style="text-align:left;font-size:.72rem">${levelLabels[sig]}</td>
          <td class="${cls}">${row.NEGATIVE || 0}</td>
          <td class="${cls}">${row.POSITIVE || 0}</td>
          <td class="${cls}">${row.NEUTRAL  || 0}</td>
          <td class="${cls}">${total}</td>
        </tr>`;
      }).join('')}
    </tbody>`;

  /* Top risks list */
  const listEl = document.getElementById('top-risks-list');
  if (topRisks.length === 0) {
    listEl.innerHTML = '<div class="no-data"><i class="fas fa-check-double" style="color:#059669"></i>No high-significance risks identified</div>';
    return;
  }
  const sigColors = { VERY_HIGH: { bg: '#fee2e2', fg: '#991b1b' }, HIGH: { bg: '#ffedd5', fg: '#9a3412' } };
  listEl.innerHTML = topRisks.map(r => {
    const c = sigColors[r.significance] || { bg: '#f1f5f9', fg: '#475569' };
    const mitTag = r.hasMitigation
      ? `<div class="rl-mit-ok"><i class="fas fa-shield-check"></i> Mitigation linked</div>`
      : `<div class="rl-mit-warn"><i class="fas fa-exclamation-triangle"></i> No mitigation — action required</div>`;
    return `<div class="risk-list-item">
      <span class="rl-sig" style="background:${c.bg};color:${c.fg}">${r.significance.replace('_', ' ')}</span>
      <div class="rl-body">
        <div class="rl-comp">${r.component}
          <span class="badge badge-gray" style="font-size:.6rem;margin-left:4px">${r.impactType}</span>
        </div>
        ${r.description ? `<div class="rl-desc">${r.description.slice(0, 90)}${r.description.length > 90 ? '…' : ''}</div>` : ''}
        ${mitTag}
      </div>
    </div>`;
  }).join('');
}

/* ── Monitoring Trends ──────────────────────────────────────────── */
const MEDIUM_PARAMS = {
  air:   ['pm25','pm10','so2','nox'],
  water: ['pH','tds','arsenic','lead'],
  soil:  ['pH','arsenic','lead','chromium'],
  noise: ['dayAvgDb','nightAvgDb','leq']
};

function renderTrends(trends) {
  const tabs   = document.getElementById('trend-tabs');
  const panels = document.getElementById('trend-panels');
  tabs.innerHTML   = '';
  panels.innerHTML = '';

  Object.entries(trends).forEach(([med, t], idx) => {
    const meta = MEDIUM_META[med];
    const tCls = t.trend;

    /* Tab */
    const tab = document.createElement('button');
    tab.className = 'trend-tab' + (idx === 0 ? ' active' : '');
    tab.dataset.med = med;
    tab.innerHTML = `<i class="fas ${meta.icon}"></i>${meta.label}<span class="trend-badge ${tCls}">${trendIcon(tCls)}</span>`;
    tab.onclick = () => switchTrend(med);
    tabs.appendChild(tab);

    /* Panel */
    const panel = document.createElement('div');
    panel.className = 'trend-panel' + (idx === 0 ? ' active' : '');
    panel.id = 'trend-panel-' + med;

    const defaultParams = MEDIUM_PARAMS[med] || [];
    const seriesKeys = t.series.map(s => s.key);
    const initParams = defaultParams.filter(p => seriesKeys.includes(p));

    panel.innerHTML = `
      <div class="trend-meta">
        <div class="trend-indicator ${tCls}">${trendIcon(tCls)}</div>
        ${t.exceedanceRates?.early !== null
          ? `<span style="font-size:.72rem;color:var(--txt2)">Earlier period: <b>${t.exceedanceRates.early}%</b> exceedance → Recent: <b>${t.exceedanceRates.recent}%</b></span>`
          : ''}
      </div>
      <div class="param-filter" id="pf-${med}">
        ${t.series.map(s =>
          `<button class="param-btn${initParams.includes(s.key) ? ' active' : ''}"
            data-med="${med}" data-key="${s.key}"
            onclick="toggleParam(this,'${med}','${s.key}')"
            style="border-color:${s.color};${initParams.includes(s.key) ? 'background:' + s.color + '1a;color:' + s.color : ''}">
            ${s.label}${s.unit ? ' (' + s.unit + ')' : ''}
          </button>`
        ).join('')}
      </div>
      <div class="chart-wrap" style="margin-top:12px">
        <canvas id="chart-${med}"></canvas>
      </div>`;
    panels.appendChild(panel);
  });

  /* Draw charts for each medium */
  Object.entries(trends).forEach(([med, t]) => {
    buildTrendChart(med, t);
  });
}

function buildTrendChart(med, t) {
  if (!t.dates || t.dates.length === 0) {
    const canvas = document.getElementById('chart-' + med);
    if (canvas) {
      const ctx = canvas.parentElement;
      ctx.innerHTML = '<div class="no-data"><i class="fas fa-chart-line"></i>No monitoring data available for this period</div>';
    }
    return;
  }

  const canvas = document.getElementById('chart-' + med);
  if (!canvas) return;

  const defaultParams = MEDIUM_PARAMS[med] || [];
  const activeKeys    = t.series.filter(s => defaultParams.includes(s.key)).map(s => s.key);

  const datasets = [];

  t.series.forEach(s => {
    if (!activeKeys.includes(s.key)) return;
    datasets.push({
      label:           s.label,
      data:            s.data,
      borderColor:     s.color,
      backgroundColor: s.color + '18',
      borderWidth:     2,
      pointRadius:     3,
      pointHoverRadius: 5,
      tension:         0.3,
      fill:            false,
      _key:            s.key,
      _med:            med
    });

    /* Standard threshold line */
    if (s.std != null) {
      datasets.push({
        label:       s.label + ' Std',
        data:        t.dates.map(() => s.std),
        borderColor: s.color + '60',
        borderDash:  [6, 3],
        borderWidth: 1.5,
        pointRadius: 0,
        tension:     0,
        fill:        false,
        _key:        s.key + '__std',
        _med:        med
      });
    }

    /* Noise std data (per-record standard) */
    if (s.stdData) {
      datasets.push({
        label:       s.label + ' Std',
        data:        s.stdData,
        borderColor: s.color + '60',
        borderDash:  [6, 3],
        borderWidth: 1.5,
        pointRadius: 0,
        tension:     0,
        fill:        false,
        _key:        s.key + '__std',
        _med:        med
      });
    }
  });

  if (_trendCharts[med]) { _trendCharts[med].destroy(); }
  _trendCharts[med] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { labels: t.dates, datasets },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      interaction:         { mode: 'index', intersect: false },
      plugins: {
        legend:  { position: 'top', labels: { font: { size: 11 }, boxWidth: 12, padding: 12 } },
        tooltip: { bodyFont: { size: 11 } }
      },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 45 }, grid: { display: false } },
        y: { ticks: { font: { size: 11 } }, grid: { color: '#f1f5f9' } }
      }
    }
  });
}

function switchTrend(med) {
  document.querySelectorAll('.trend-tab').forEach(t => t.classList.toggle('active', t.dataset.med === med));
  document.querySelectorAll('.trend-panel').forEach(p => p.classList.toggle('active', p.id === 'trend-panel-' + med));
}

function toggleParam(btn, med, key) {
  const t    = _analytics.trends[med];
  const chart = _trendCharts[med];
  if (!chart) return;

  btn.classList.toggle('active');
  const isActive = btn.classList.contains('active');
  const s        = t.series.find(x => x.key === key);
  if (s) {
    if (isActive) {
      btn.style.borderColor = s.color;
      btn.style.background  = s.color + '1a';
      btn.style.color       = s.color;
    } else {
      btn.style.borderColor = '';
      btn.style.background  = '';
      btn.style.color       = '';
    }
  }

  chart.data.datasets.forEach(ds => {
    if (ds._med === med && (ds._key === key || ds._key === key + '__std')) {
      ds.hidden = !isActive;
    }
  });
  chart.update();
}

/* ── Mitigation ─────────────────────────────────────────────────── */
const STATUS_COLORS = {
  COMPLETED:       '#059669',
  IN_PROGRESS:     '#0d9488',
  PLANNED:         '#3b82f6',
  DEFERRED:        '#d97706',
  NOT_APPLICABLE:  '#94a3b8'
};
const STATUS_LABELS = {
  COMPLETED: 'Completed', IN_PROGRESS: 'In Progress', PLANNED: 'Planned',
  DEFERRED: 'Deferred', NOT_APPLICABLE: 'N/A'
};

function renderMitigation(mit) {
  const el = document.getElementById('mitigation-content');
  const statusKeys = ['COMPLETED','IN_PROGRESS','PLANNED','DEFERRED','NOT_APPLICABLE'];
  const donutData  = statusKeys.map(k => mit.byStatus[k] || 0);
  const colors     = statusKeys.map(k => STATUS_COLORS[k]);

  el.innerHTML = `
    <div class="g2" style="gap:16px;align-items:start">
      <div class="mit-donut-wrap">
        <canvas class="mit-donut-canvas" id="mit-donut" width="200" height="200"></canvas>
        <div class="mit-legend" id="mit-legend"></div>
      </div>
      <div>
        <div class="mit-stats" id="mit-stats"></div>
        ${mit.criticalGaps.length > 0
          ? `<div style="margin-top:14px">
               <div style="font-size:.72rem;font-weight:800;color:#dc2626;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">
                 <i class="fas fa-exclamation-triangle"></i> Critical Gaps (${mit.criticalGaps.length})
               </div>
               ${mit.criticalGaps.map(g => `
                 <div class="gap-item">
                   <span class="gap-sig"><span class="badge badge-red" style="font-size:.6rem">${g.significance.replace('_',' ')}</span></span>
                   <div class="gap-body">
                     <div class="gap-comp">${g.component}</div>
                     ${g.description ? `<div class="gap-desc">${g.description.slice(0,70)}${g.description.length>70?'…':''}</div>` : ''}
                   </div>
                 </div>`).join('')}
             </div>`
          : ''}
      </div>
    </div>
    <div style="margin-top:16px">
      <div style="font-size:.72rem;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">By Component</div>
      <table class="comp-table" id="comp-table">
        <thead><tr><th>Component</th><th>Done</th><th>Progress</th><th>Rate</th></tr></thead>
        <tbody id="comp-tbody"></tbody>
      </table>
    </div>`;

  /* Donut chart */
  if (_mitChart) _mitChart.destroy();
  _mitChart = new Chart(document.getElementById('mit-donut').getContext('2d'), {
    type: 'doughnut',
    data: { labels: statusKeys.map(k => STATUS_LABELS[k]), datasets: [{ data: donutData, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { bodyFont: { size: 11 } }
      }
    }
  });

  /* Legend */
  document.getElementById('mit-legend').innerHTML = statusKeys.map((k, i) => `
    <div class="mit-leg-item">
      <div class="mit-leg-left">
        <div class="mit-leg-dot" style="background:${colors[i]}"></div>
        <span>${STATUS_LABELS[k]}</span>
      </div>
      <span style="font-weight:800">${mit.byStatus[k] || 0}</span>
    </div>`).join('');

  /* Stats */
  const achTxt = mit.achievementRate !== null ? mit.achievementRate + '%' : '—';
  document.getElementById('mit-stats').innerHTML = `
    <div class="mit-stat"><div class="ms-val" style="color:${rateColor(mit.overallRate)}">${mit.overallRate}%</div><div class="ms-lbl">Completion Rate</div></div>
    <div class="mit-stat"><div class="ms-val">${achTxt}</div><div class="ms-lbl">Achievement Rate</div></div>
    <div class="mit-stat"><div class="ms-val">${mit.total}</div><div class="ms-lbl">Total Measures</div></div>
    <div class="mit-stat"><div class="ms-val">${mit.eligible}</div><div class="ms-lbl">Eligible</div></div>`;

  /* Component table */
  document.getElementById('comp-tbody').innerHTML = mit.byComponent.slice(0, 8).map(c => `
    <tr>
      <td style="font-weight:600">${c.component}</td>
      <td><span style="color:#059669;font-weight:800">${c.COMPLETED}</span>/${c.COMPLETED + c.IN_PROGRESS + c.PLANNED}</td>
      <td>
        <div class="rate-bar-wrap">
          <div class="rate-bar"><div class="rate-bar-fill" style="width:${c.completionRate}%;background:${rateColor(c.completionRate)}"></div></div>
        </div>
      </td>
      <td style="font-weight:800;color:${rateColor(c.completionRate)}">${c.completionRate}%</td>
    </tr>`).join('');
}

/* ── AI Recommendations ─────────────────────────────────────────── */
const REC_PRIORITY_META = {
  CRITICAL: { badge: 'badge-red',    label: 'Critical' },
  HIGH:     { badge: 'badge-orange', label: 'High'     },
  MEDIUM:   { badge: 'badge-teal',   label: 'Medium'   },
  LOW:      { badge: 'badge-green',  label: 'Low'      }
};
const REC_CAT_META = {
  COMPLIANCE:  { badge: 'badge-purple', label: 'Compliance'  },
  MITIGATION:  { badge: 'badge-amber',  label: 'Mitigation'  },
  RISK:        { badge: 'badge-red',    label: 'Risk'        },
  TREND:       { badge: 'badge-teal',   label: 'Trend'       },
  MONITORING:  { badge: 'badge-gray',   label: 'Monitoring'  },
  PERFORMANCE: { badge: 'badge-green',  label: 'Performance' }
};

function renderRecommendations(recs) {
  const priorities = ['ALL', ...new Set(recs.map(r => r.priority))];
  const filters    = document.getElementById('rec-filters');
  filters.innerHTML = priorities.map(p => {
    const cnt = p === 'ALL' ? recs.length : recs.filter(r => r.priority === p).length;
    return `<button class="rec-filter${p === 'ALL' ? ' active' : ''}" data-p="${p}" onclick="filterRecs('${p}')">
      ${p === 'ALL' ? 'All' : p.charAt(0) + p.slice(1).toLowerCase()} (${cnt})
    </button>`;
  }).join('');

  renderRecList(recs, 'ALL');
}

function filterRecs(priority) {
  _activeRec = priority;
  document.querySelectorAll('.rec-filter').forEach(f => f.classList.toggle('active', f.dataset.p === priority));
  renderRecList(_analytics.recommendations, priority);
}

function renderRecList(recs, priority) {
  const filtered = priority === 'ALL' ? recs : recs.filter(r => r.priority === priority);
  const listEl   = document.getElementById('rec-list');

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="no-data"><i class="fas fa-check-circle" style="color:#059669"></i>No recommendations for this priority level</div>';
    return;
  }

  listEl.innerHTML = filtered.map(r => {
    const pm   = REC_PRIORITY_META[r.priority] || { badge: 'badge-gray', label: r.priority };
    const cm   = REC_CAT_META[r.category]      || { badge: 'badge-gray', label: r.category };
    return `<div class="rec-card ${r.priority}">
      <div class="rec-card-hdr">
        <span class="badge ${pm.badge}">${pm.label}</span>
        <span class="badge ${cm.badge}">${cm.label}</span>
        <div class="rec-title">${r.title}</div>
      </div>
      <div class="rec-body">${r.description}</div>
      <div class="rec-action"><i class="fas fa-arrow-right"></i><span>${r.action}</span></div>
    </div>`;
  }).join('');
}

/* ── Main Render ────────────────────────────────────────────────── */
function renderAll(data) {
  _analytics = data;

  /* Header */
  document.getElementById('hdr-proj').textContent =
    (data.meta?.projectId ? 'Project: ' + data.meta.projectId : 'EIA Analytics');
  document.getElementById('last-updated').textContent =
    'Computed: ' + new Date(data.meta.computedAt).toLocaleString();

  const score = data.performanceScore;
  renderGauge(score.overall, score.grade, score.gradeLabel);
  renderScoreSubs(score.components, score.weights);

  renderCompliance(data.compliance);
  renderRiskMatrix(data.riskMatrix);
  renderTrends(data.trends);
  renderMitigation(data.mitigation);
  renderRecommendations(data.recommendations);

  document.getElementById('overlay').classList.add('hidden');
}

/* ── Data Loading ───────────────────────────────────────────────── */
async function loadData() {
  if (!ORG_ID || !PROJ_ID) {
    document.getElementById('overlay').innerHTML =
      '<i class="fas fa-exclamation-circle" style="font-size:2rem;color:#ef4444"></i>' +
      '<div class="ov-msg" style="color:#ef4444">Missing orgId or projectId in URL parameters</div>' +
      '<button class="btn btn-outline" onclick="history.back()" style="margin-top:8px"><i class="fas fa-arrow-left"></i> Go Back</button>';
    return;
  }
  try {
    const res = await apiFetch(`${API_EIA}/${ORG_ID}/projects/${PROJ_ID}/analytics`);
    renderAll(res.data.analytics);
  } catch (err) {
    document.getElementById('overlay').innerHTML =
      '<i class="fas fa-exclamation-circle" style="font-size:2rem;color:#ef4444"></i>' +
      '<div class="ov-msg" style="color:#ef4444">Failed to load analytics: ' + err.message + '</div>' +
      '<button class="btn btn-primary" onclick="loadData()" style="margin-top:8px"><i class="fas fa-redo"></i> Retry</button>';
  }
}

async function refreshData() {
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlay').innerHTML =
    '<div class="spin"></div><div class="ov-msg">Refreshing analytics…</div>';
  await loadData();
  showToast('Analytics refreshed', 'success');
}

function exitAnalytics() {
  history.back();
}

/* ── Boot ───────────────────────────────────────────────────────── */
loadData();
