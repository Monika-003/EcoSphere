<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="gTri" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="gCirc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e5fc8"/>
      <stop offset="100%" style="stop-color:#3b9eff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Triangle outline -->
  <polygon points="30,4 56,52 4,52" fill="none" stroke="url(#gTri)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Circle -->
  <circle cx="30" cy="34" r="13" fill="none" stroke="url(#gCirc)" stroke-width="2.8" filter="url(#glow)"/>
  <!-- Checkmark -->
  <polyline points="23,34 28,40 38,27" fill="none" stroke="url(#gTri)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
